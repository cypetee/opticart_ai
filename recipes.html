<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>OptiCart — Recipes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#006a35">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OptiCart">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { manrope: ['Manrope', 'sans-serif'], inter: ['Inter', 'sans-serif'] },
          colors: {
            primary: "#006a35", "primary-dim": "#005c2d", "primary-container": "#75f39c",
            "on-primary": "#cdffd4", secondary: "#006946", "secondary-container": "#72fbbd",
            "on-secondary-container": "#005e3e", surface: "#f6f6f9",
            "surface-container-lowest": "#ffffff", "surface-container-low": "#f0f0f3",
            "surface-container": "#e7e8eb", "surface-container-high": "#e1e2e6",
            "surface-container-highest": "#dbdde0", "on-surface": "#2d2f31",
            "on-surface-variant": "#5a5c5e", "outline-variant": "#acadaf",
            tertiary: "#006576", "tertiary-container": "#00dcff",
            "error-container": "#ffdad6", "on-error-container": "#410002",
          }
        }
      }
    }
  </script>
  <style>
    body { min-height: max(884px, 100dvh); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; line-height: 1; }
    .nav-tab-active { background-color: #72fbbd; color: #005e3e; border-radius: 1rem; }
    .nav-tab-inactive { color: #5a5c5e; }
    .filter-chip { transition: all 0.2s ease; }
    .filter-chip.active { background-color: #006a35; color: #cdffd4; }
    .recipe-card { transition: box-shadow 0.25s ease, transform 0.15s ease; }
    .recipe-card:active { transform: scale(0.98); }
    .recipe-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
  </style>
</head>
<body class="bg-surface text-on-surface font-inter overflow-x-hidden">

  <!-- Background blobs -->
  <div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
    <div class="absolute -top-32 -right-32 w-80 h-80 bg-tertiary-container/15 rounded-full blur-[120px]"></div>
    <div class="absolute -bottom-32 -left-32 w-80 h-80 bg-primary-container/20 rounded-full blur-[120px]"></div>
  </div>

  <!-- Top bar -->
  <header class="fixed top-0 inset-x-0 z-50 h-16 bg-surface/80 backdrop-blur-md border-b border-outline-variant/10">
    <div class="max-w-2xl mx-auto h-full px-6 flex items-center justify-between">
      <span class="font-manrope font-extrabold italic text-xl tracking-tight text-on-surface">OptiCart</span>
      <a href="profile.html" class="flex-shrink-0 w-9 h-9 rounded-full bg-gradient-to-br from-primary to-primary-dim flex items-center justify-center shadow-sm ring-2 ring-primary-container active:scale-95 transition-transform">
        <span class="material-symbols-outlined text-on-primary" style="font-size:19px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">person</span>
      </a>
    </div>
  </header>

  <!-- Main content -->
  <main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">

    <!-- Page heading -->
    <div class="mb-5">
      <h1 class="font-manrope font-bold text-2xl text-on-surface">Recipes</h1>
      <p class="text-sm text-on-surface-variant mt-1">Based on your list &amp; preferences</p>
    </div>

    <!-- Search bar -->
    <div class="relative mb-5">
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size:18px">search</span>
      <input type="text" placeholder="Search recipes..." class="w-full h-12 bg-surface-container-lowest rounded-xl pl-10 pr-4 text-sm text-on-surface placeholder-on-surface-variant/50 outline-none border border-outline-variant/20 focus:border-primary/40 transition-colors">
    </div>

    <!-- Filter chips -->
    <div class="flex gap-2 overflow-x-auto pb-1 mb-6 -mx-6 px-6" style="scrollbar-width:none">
      <button onclick="setFilter(this)" class="filter-chip active flex-shrink-0 px-4 py-2 rounded-full bg-primary text-on-primary text-xs font-semibold transition-all duration-200 active:scale-95">All</button>
      <button onclick="setFilter(this)" class="filter-chip flex-shrink-0 px-4 py-2 rounded-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant text-xs font-medium hover:border-primary/30 transition-all duration-200 active:scale-95">🌱 Vegan</button>
      <button onclick="setFilter(this)" class="filter-chip flex-shrink-0 px-4 py-2 rounded-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant text-xs font-medium hover:border-primary/30 transition-all duration-200 active:scale-95">⚡ Quick</button>
      <button onclick="setFilter(this)" class="filter-chip flex-shrink-0 px-4 py-2 rounded-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant text-xs font-medium hover:border-primary/30 transition-all duration-200 active:scale-95">💰 Budget</button>
      <button onclick="setFilter(this)" class="filter-chip flex-shrink-0 px-4 py-2 rounded-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant text-xs font-medium hover:border-primary/30 transition-all duration-200 active:scale-95">💪 High Protein</button>
      <button onclick="setFilter(this)" class="filter-chip flex-shrink-0 px-4 py-2 rounded-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant text-xs font-medium hover:border-primary/30 transition-all duration-200 active:scale-95">🫀 Heart Healthy</button>
    </div>

    <!-- AI match banner -->
    <div class="flex items-center gap-2 bg-secondary-container/20 rounded-xl px-4 py-3 mb-5 border border-secondary/10">
      <span class="material-symbols-outlined text-primary" style="font-size:18px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">auto_awesome</span>
      <p class="text-xs text-on-surface-variant leading-snug flex-1">Recipes are ranked by how well they match ingredients in <span class="font-semibold text-on-surface">your current list</span>.</p>
    </div>

    <!-- Recipe list -->
    <div id="recipe-list" class="space-y-4">
      <!-- Skeleton loaders -->
      <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm flex flex-row animate-pulse" style="min-height:128px">
        <div class="w-28 flex-shrink-0 bg-surface-container"></div>
        <div class="p-4 flex-1"><div class="h-3 bg-surface-container rounded mb-2 w-3/4"></div><div class="h-3 bg-surface-container rounded w-1/2 mb-4"></div><div class="h-3 bg-surface-container rounded w-1/3"></div></div>
      </div>
      <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm flex flex-row animate-pulse" style="min-height:128px">
        <div class="w-28 flex-shrink-0 bg-surface-container"></div>
        <div class="p-4 flex-1"><div class="h-3 bg-surface-container rounded mb-2 w-3/4"></div><div class="h-3 bg-surface-container rounded w-1/2 mb-4"></div><div class="h-3 bg-surface-container rounded w-1/3"></div></div>
      </div>
      <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm flex flex-row animate-pulse" style="min-height:128px">
        <div class="w-28 flex-shrink-0 bg-surface-container"></div>
        <div class="p-4 flex-1"><div class="h-3 bg-surface-container rounded mb-2 w-3/4"></div><div class="h-3 bg-surface-container rounded w-1/2 mb-4"></div><div class="h-3 bg-surface-container rounded w-1/3"></div></div>
      </div>
    </div>

  </main>

  <!-- Bottom nav -->
  <nav class="fixed bottom-0 inset-x-0 bg-white rounded-t-[24px] shadow-[0_-8px_24px_rgba(0,0,0,0.06)] px-8 pb-8 pt-4 z-50">
    <div class="max-w-2xl mx-auto flex items-center justify-around">
      <a href="lists.html" class="nav-tab-inactive flex flex-col items-center gap-0.5 px-3 py-1.5 transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined" style="font-size:22px">checklist</span>
        <span class="text-xs font-medium">Lists</span>
      </a>
      <a href="missions.html" class="nav-tab-inactive flex flex-col items-center gap-0.5 px-3 py-1.5 transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined" style="font-size:22px">assignment_turned_in</span>
        <span class="text-xs font-medium">Missions</span>
      </a>
      <a href="deals.html" class="nav-tab-inactive flex flex-col items-center gap-0.5 px-3 py-1.5 transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined" style="font-size:22px">local_offer</span>
        <span class="text-xs font-medium">Deals</span>
      </a>
      <a href="cart.html" class="nav-tab-inactive flex flex-col items-center gap-0.5 px-3 py-1.5 transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined" style="font-size:22px">shopping_cart</span>
        <span class="text-xs font-medium">Cart</span>
      </a>
    </div>
  </nav>

  <script src="data/grocery.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ai-filter.js"></script>
  <script>
    let allRecipes = [];
    let activeFilter = 'all';

    function recipeCardHTML(recipe) {
      const chips = recipe.tags.slice(0, 2).map(t =>
        `<span class="bg-tertiary-container/30 text-tertiary text-xs px-2 py-0.5 rounded-full font-medium">${t}</span>`
      ).join('');
      const matchColor = recipe.match >= 85 ? 'bg-primary' : recipe.match >= 70 ? 'bg-secondary' : 'bg-on-surface-variant';
      return `
        <div class="recipe-card bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm flex flex-row cursor-pointer">
          <div class="w-28 flex-shrink-0 bg-gradient-to-br from-primary/40 to-secondary/50 flex items-center justify-center text-4xl relative" style="min-height:128px">
            ${recipe.emoji}
            <span class="absolute top-2 left-2 text-xs font-bold ${matchColor} text-on-primary px-2 py-0.5 rounded-full">${recipe.match}%</span>
          </div>
          <div class="p-4 flex flex-col justify-between flex-1 min-w-0">
            <div>
              <h3 class="font-manrope font-bold text-sm text-on-surface leading-snug mb-2">${recipe.name}</h3>
              <div class="flex flex-wrap gap-1.5 mb-2">
                ${chips}
                <span class="bg-tertiary-container/30 text-tertiary text-xs px-2 py-0.5 rounded-full font-medium">${recipe.time} min</span>
              </div>
            </div>
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-1">
                <span class="material-symbols-outlined text-primary" style="font-size:14px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">auto_awesome</span>
                <span class="text-xs font-semibold text-primary">${recipe.match}% ingredient match</span>
              </div>
              <button class="text-xs font-bold text-primary hover:text-primary-dim transition-colors">View</button>
            </div>
          </div>
        </div>`;
    }

    function renderRecipes() {
      const filtered = activeFilter === 'all'
        ? allRecipes
        : allRecipes.filter(r => r.tags.some(t => t.toLowerCase().includes(activeFilter)));

      const list = document.getElementById('recipe-list');
      list.innerHTML = filtered.length
        ? filtered.map(recipeCardHTML).join('')
        : '<p class="text-sm text-on-surface-variant text-center py-8">No recipes match this filter.</p>';
    }

    function setFilter(el) {
      document.querySelectorAll('.filter-chip').forEach(c => {
        c.classList.remove('active', 'bg-primary', 'text-on-primary');
        c.classList.add('bg-surface-container-lowest', 'border', 'border-outline-variant/30', 'text-on-surface-variant');
      });
      el.classList.add('active', 'bg-primary', 'text-on-primary');
      el.classList.remove('bg-surface-container-lowest', 'border', 'border-outline-variant/30', 'text-on-surface-variant');
      activeFilter = el.textContent.trim().replace(/^[^\w]*/,'').toLowerCase().split(' ')[0];
      if (el.textContent.includes('All')) activeFilter = 'all';
      renderRecipes();
    }

    async function init() {
      const profile = Storage.get();
      const apiKey = Storage.getApiKey();
      allRecipes = await AIFilter.getRecipes(profile, apiKey, 15);
      renderRecipes();
    }

    window.GROCERY_DB_READY.then(init);
  </script>

  <script>if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));</script>
</body>
</html>
