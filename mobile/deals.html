<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>OptiCart — Deals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#006a35">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OptiCart">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { manrope: ['Manrope', 'sans-serif'], inter: ['Inter', 'sans-serif'] },
          colors: {
            primary: "#006a35", "primary-dim": "#005c2d", "primary-container": "#75f39c",
            "on-primary": "#cdffd4", secondary: "#006946", "secondary-container": "#72fbbd",
            "on-secondary-container": "#005e3e", surface: "#f6f6f9",
            "surface-container-lowest": "#ffffff", "surface-container-low": "#f0f0f3",
            "surface-container": "#e7e8eb", "surface-container-high": "#e1e2e6",
            "surface-container-highest": "#dbdde0", "on-surface": "#2d2f31",
            "on-surface-variant": "#5a5c5e", "outline-variant": "#acadaf",
            tertiary: "#006576", "tertiary-container": "#00dcff",
            "error-container": "#ffdad6", "on-error-container": "#410002",
          }
        }
      }
    }
  </script>
  <style>
    body { min-height: max(884px, 100dvh); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; line-height: 1; }
    .scroll-row { -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .scroll-row::-webkit-scrollbar { display: none; }
    .nav-tab-active { background-color: #72fbbd; color: #005e3e; border-radius: 1rem; }
    .nav-tab-inactive { color: #5a5c5e; }
  </style>
</head>
<body class="bg-surface text-on-surface font-inter overflow-x-hidden">

  <!-- Background blobs -->
  <div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
    <div class="absolute -top-32 -right-32 w-80 h-80 bg-primary-container/20 rounded-full blur-[120px]"></div>
    <div class="absolute -bottom-32 -left-32 w-80 h-80 bg-secondary-container/15 rounded-full blur-[120px]"></div>
  </div>

  <!-- Top bar -->
  <header class="fixed top-0 inset-x-0 z-50 h-16 bg-surface/80 backdrop-blur-md border-b border-outline-variant/10">
    <div class="max-w-2xl mx-auto h-full px-6 flex items-center justify-between">
      <span class="font-manrope font-extrabold italic text-xl tracking-tight text-on-surface">OptiCart</span>
      <a href="profile.html" class="flex-shrink-0 w-9 h-9 rounded-full bg-gradient-to-br from-primary to-primary-dim flex items-center justify-center shadow-sm ring-2 ring-primary-container active:scale-95 transition-transform">
        <span class="material-symbols-outlined text-on-primary" style="font-size:19px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">person</span>
      </a>
    </div>
  </header>

  <!-- Main content -->
  <main class="pt-24 pb-32 max-w-2xl mx-auto">

    <!-- ── Section 1: Personalized Deals ── -->
    <div class="px-6 mb-8">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary" style="font-size:20px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">local_offer</span>
          <h2 class="font-manrope font-bold text-xl text-on-surface">Deals For You</h2>
        </div>
        <a href="#" class="text-xs font-semibold text-primary hover:text-primary-dim transition-colors">See all</a>
      </div>
    </div>

    <!-- Horizontal scroll deal cards -->
    <div id="deals-row" class="scroll-row flex gap-4 overflow-x-auto pb-2 px-6">
      <!-- Skeleton loaders -->
      <div class="min-w-[160px] bg-surface-container-lowest rounded-xl p-4 flex-shrink-0 animate-pulse">
        <div class="h-24 w-full rounded-lg bg-surface-container mb-3"></div>
        <div class="h-3 bg-surface-container rounded mb-2 w-3/4"></div>
        <div class="h-3 bg-surface-container rounded w-1/2"></div>
      </div>
      <div class="min-w-[160px] bg-surface-container-lowest rounded-xl p-4 flex-shrink-0 animate-pulse">
        <div class="h-24 w-full rounded-lg bg-surface-container mb-3"></div>
        <div class="h-3 bg-surface-container rounded mb-2 w-3/4"></div>
        <div class="h-3 bg-surface-container rounded w-1/2"></div>
      </div>
      <div class="min-w-[160px] bg-surface-container-lowest rounded-xl p-4 flex-shrink-0 animate-pulse">
        <div class="h-24 w-full rounded-lg bg-surface-container mb-3"></div>
        <div class="h-3 bg-surface-container rounded mb-2 w-3/4"></div>
        <div class="h-3 bg-surface-container rounded w-1/2"></div>
      </div>
    </div>

    <!-- ── Section 2: AI-Matched Recipes ── -->
    <div class="px-6 mt-8 mb-4">
      <div class="flex items-center justify-between mb-1">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary" style="font-size:20px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">auto_awesome</span>
          <h2 class="font-manrope font-bold text-xl text-on-surface">Recipes Based on Your List</h2>
        </div>
        <a href="recipes.html" class="text-xs font-semibold text-primary hover:text-primary-dim transition-colors">Explore</a>
      </div>
      <p class="text-xs text-on-surface-variant mt-1 mb-5">Ingredients you already have or need</p>

      <!-- Recipe cards (vertical) -->
      <div id="recipes-list" class="space-y-4">
        <!-- Skeleton -->
        <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm flex flex-row animate-pulse" style="min-height:112px">
          <div class="w-28 flex-shrink-0 bg-surface-container"></div>
          <div class="p-4 flex-1"><div class="h-3 bg-surface-container rounded mb-2 w-3/4"></div><div class="h-3 bg-surface-container rounded w-1/2"></div></div>
        </div>
        <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm flex flex-row animate-pulse" style="min-height:112px">
          <div class="w-28 flex-shrink-0 bg-surface-container"></div>
          <div class="p-4 flex-1"><div class="h-3 bg-surface-container rounded mb-2 w-3/4"></div><div class="h-3 bg-surface-container rounded w-1/2"></div></div>
        </div>
      </div>
    </div>

    <!-- ── Section 3: Budget Tracker ── -->
    <div class="px-6 mt-6">
      <div class="bg-primary-container/20 rounded-xl p-5">
        <div class="flex items-center gap-2 mb-3">
          <span class="material-symbols-outlined text-primary" style="font-size:20px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">savings</span>
          <span class="text-sm font-semibold text-on-surface-variant">This Week's Savings</span>
        </div>
        <p class="font-manrope font-bold text-3xl text-primary mb-3" id="savings-amount">$0.00 <span class="text-base font-semibold text-on-surface-variant">saved</span></p>
        <div class="w-full h-2 bg-surface-container-high rounded-full overflow-hidden mb-2">
          <div class="h-full bg-gradient-to-r from-primary to-secondary rounded-full" style="width:62%"></div>
        </div>
        <p class="text-xs text-on-surface-variant" id="savings-summary">Loading deals...</p>
      </div>
    </div>

  </main>

  <!-- Bottom nav -->
  <nav class="fixed bottom-0 inset-x-0 bg-white rounded-t-[24px] shadow-[0_-8px_24px_rgba(0,0,0,0.06)] px-8 pb-8 pt-4 z-50">
    <div class="max-w-2xl mx-auto flex items-center justify-around">
      <a href="lists.html" class="nav-tab-inactive flex flex-col items-center gap-0.5 px-3 py-1.5 transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined" style="font-size:22px">checklist</span>
        <span class="text-xs font-medium">Lists</span>
      </a>
      <a href="missions.html" class="nav-tab-inactive flex flex-col items-center gap-0.5 px-3 py-1.5 transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined" style="font-size:22px">assignment_turned_in</span>
        <span class="text-xs font-medium">Missions</span>
      </a>
      <a href="deals.html" class="nav-tab-active flex items-center gap-1.5 px-4 py-2 transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined" style="font-size:22px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">local_offer</span>
        <span class="text-xs font-semibold">Deals</span>
      </a>
      <a href="cart.html" class="nav-tab-inactive flex flex-col items-center gap-0.5 px-3 py-1.5 transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined" style="font-size:22px">shopping_cart</span>
        <span class="text-xs font-medium">Cart</span>
      </a>
    </div>
  </nav>

  <script src="data/grocery.js"></script>
  <script src="js/storage.js"></script>
  <script>
    function dealCardHTML(item) {
      const orig = item.price / (1 - item.deal / 100);
      const salePrice = item.price.toFixed(2);
      return `
        <div class="deal-card min-w-[160px] bg-surface-container-lowest rounded-xl p-4 shadow-sm flex-shrink-0">
          <div class="h-24 w-full rounded-lg bg-surface-container mb-3 flex items-center justify-center text-4xl">${item.emoji}</div>
          <div class="flex items-start justify-between gap-1 mb-1.5">
            <p class="font-semibold text-xs text-on-surface leading-tight flex-1">${item.name}</p>
            <span class="bg-error-container text-on-error-container text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0">-${item.deal}%</span>
          </div>
          <div class="flex items-center gap-1.5 mb-3">
            <span class="text-xs text-on-surface-variant line-through">$${orig.toFixed(2)}</span>
            <span class="text-sm font-bold text-primary">$${salePrice}</span>
          </div>
          <div class="flex gap-2">
            <button onclick="addToList(this,'${item.id}')" class="flex-1 text-xs font-semibold bg-primary-container text-on-secondary-container rounded-lg py-2 px-2 active:scale-[0.98] transition-all">+ List</button>
            <button onclick="addToCartDirect(this,'${item.id}')" class="flex-1 text-xs font-semibold bg-primary text-on-primary rounded-lg py-2 px-2 active:scale-[0.98] transition-all">+ Cart</button>
          </div>
        </div>`;
    }

    function recipeCardHTML(recipe) {
      const chips = (recipe.tags || []).slice(0, 3).map(t =>
        `<span class="bg-tertiary-container/30 text-tertiary text-xs px-2 py-0.5 rounded-full font-medium">${t}</span>`
      ).join('');
      return `
        <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm flex flex-row">
          <div class="w-28 flex-shrink-0 bg-gradient-to-br from-primary/40 to-secondary/50 flex items-center justify-center text-4xl" style="min-height:112px">${recipe.emoji}</div>
          <div class="p-4 flex flex-col justify-between flex-1 min-w-0">
            <div>
              <h3 class="font-manrope font-bold text-sm text-on-surface leading-snug mb-2">${recipe.name}</h3>
              <div class="flex flex-wrap gap-1.5 mb-2">${chips}<span class="bg-tertiary-container/30 text-tertiary text-xs px-2 py-0.5 rounded-full font-medium">${recipe.time} min</span></div>
            </div>
            <a href="recipes.html" class="text-xs font-bold text-primary">View Recipe</a>
          </div>
        </div>`;
    }

    function addToList(btn, itemId) {
      const list = JSON.parse(localStorage.getItem('opticart_list') || '[]');
      if (!list.includes(itemId)) { list.push(itemId); localStorage.setItem('opticart_list', JSON.stringify(list)); }
      btn.textContent = '✓ List';
      btn.disabled = true;
      btn.classList.add('opacity-60');
    }

    function addToCartDirect(btn, itemId) {
      const cart = JSON.parse(localStorage.getItem('opticart_cart') || '[]');
      const existing = cart.find(i => i.id === itemId);
      if (existing) { existing.qty++; }
      else {
        const item = window.GROCERY_DB && window.GROCERY_DB.items.find(i => i.id === itemId);
        if (item) cart.push({ id: item.id, name: item.name, emoji: item.emoji, price: item.price, qty: 1 });
      }
      localStorage.setItem('opticart_cart', JSON.stringify(cart));
      btn.textContent = '✓ Cart';
      btn.disabled = true;
      btn.classList.add('opacity-60');
    }

    function loadDeals() {
      const db = window.GROCERY_DB;
      if (!db || !db.items) {
        document.getElementById('deals-row').innerHTML = '<p class="text-sm text-on-surface-variant px-2">Could not load deals. Please refresh.</p>';
        document.getElementById('recipes-list').innerHTML = '';
        return;
      }

      // Deal items — truthy check covers both null and undefined
      const dealItems = db.items
        .filter(i => i.deal)
        .sort((a, b) => b.deal - a.deal)
        .slice(0, 12);

      const dealsRow = document.getElementById('deals-row');
      dealsRow.innerHTML = dealItems.length
        ? dealItems.map(dealCardHTML).join('')
        : '<p class="text-sm text-on-surface-variant px-2">No deals right now. Check back soon!</p>';

      // Recipes
      const recipes = (db.recipes || []).slice(0, 3);
      const recipesList = document.getElementById('recipes-list');
      recipesList.innerHTML = recipes.length
        ? recipes.map(recipeCardHTML).join('')
        : '<p class="text-sm text-on-surface-variant">No recipes found.</p>';

      // Savings
      const totalSaved = dealItems.reduce((sum, i) => {
        const orig = i.price / (1 - i.deal / 100);
        return sum + (orig - i.price);
      }, 0);
      document.getElementById('savings-amount').innerHTML =
        `$${totalSaved.toFixed(2)} <span class="text-base font-semibold text-on-surface-variant">saved</span>`;
      document.getElementById('savings-summary').textContent =
        `${dealItems.length} deals available this week`;
    }

    // Run as soon as DB is ready — with a 3s timeout fallback
    function initDeals() {
      if (window.GROCERY_DB_READY) {
        const timeout = new Promise(r => setTimeout(r, 3000));
        Promise.race([window.GROCERY_DB_READY, timeout]).then(loadDeals);
      } else {
        // grocery.js not loaded yet, try on DOMContentLoaded
        document.addEventListener('DOMContentLoaded', () => {
          setTimeout(loadDeals, 500);
        });
      }
    }
    initDeals();
  </script>
  <script>if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));</script>
</body>
</html>
