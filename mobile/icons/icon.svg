  <rect width="512" height="512" rx="112" fill="url(#glow)" opacity="0.25"/>
  <defs>
    <radialGradient id="glow" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#75f39c"/>
      <stop offset="100%" stop-color="#006a35"/>
