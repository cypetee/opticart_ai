<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>OptiCart — My Lists</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#006a35">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OptiCart">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { manrope: ['Manrope', 'sans-serif'], inter: ['Inter', 'sans-serif'] },
          colors: {
            primary: "#006a35", "primary-dim": "#005c2d", "primary-container": "#75f39c",
            "on-primary": "#cdffd4", secondary: "#006946", "secondary-container": "#72fbbd",
            "on-secondary-container": "#005e3e", surface: "#f6f6f9",
            "surface-container-lowest": "#ffffff", "surface-container-low": "#f0f0f3",
            "surface-container": "#e7e8eb", "surface-container-high": "#e1e2e6",
            "surface-container-highest": "#dbdde0", "on-surface": "#2d2f31",
            "on-surface-variant": "#5a5c5e", "outline-variant": "#acadaf",
            tertiary: "#006576", "tertiary-container": "#00dcff",
            "error-container": "#ffdad6", "on-error-container": "#410002",
          }
        }
      }
    }
  </script>
  <style>
    body { min-height: max(884px, 100dvh); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; line-height: 1; }
    .nav-tab-active { background-color: #72fbbd; color: #005e3e; border-radius: 1rem; }
    .nav-tab-inactive { color: #5a5c5e; }
    .item-checked { opacity: 0.45; }
    .item-checked .item-name { text-decoration: line-through; }
  </style>
</head>
<body class="bg-surface text-on-surface font-inter overflow-x-hidden">

  <!-- Background blobs -->
  <div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
    <div class="absolute -top-32 -left-32 w-80 h-80 bg-primary-container/20 rounded-full blur-[120px]"></div>
    <div class="absolute -bottom-32 -right-32 w-80 h-80 bg-tertiary-container/10 rounded-full blur-[120px]"></div>
  </div>

  <!-- Top bar -->
  <header class="fixed top-0 inset-x-0 z-50 h-16 bg-surface/80 backdrop-blur-md border-b border-outline-variant/10">
    <div class="max-w-2xl mx-auto h-full px-6 flex items-center justify-between">
      <span class="font-manrope font-extrabold italic text-xl tracking-tight text-on-surface">OptiCart</span>
      <div class="flex items-center gap-2">
        <button onclick="showAddModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-primary text-on-primary hover:bg-primary-dim transition-colors duration-200 active:scale-95">
          <span class="material-symbols-outlined" style="font-size:20px">add</span>
        </button>
        <a href="profile.html" class="flex-shrink-0 w-9 h-9 rounded-full bg-gradient-to-br from-primary to-primary-dim flex items-center justify-center shadow-sm ring-2 ring-primary-container active:scale-95 transition-transform">
          <span class="material-symbols-outlined text-on-primary" style="font-size:19px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">person</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">

    <!-- Page heading -->
    <div class="mb-6">
      <h1 class="font-manrope font-bold text-2xl text-on-surface">My Lists</h1>
      <p class="text-sm text-on-surface-variant mt-1" id="list-subtitle">Loading...</p>
    </div>

    <!-- Search / filter bar -->
    <div class="relative mb-6">
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size:18px">search</span>
      <input type="text" placeholder="Search items..." class="w-full h-12 bg-surface-container-lowest rounded-xl pl-10 pr-4 text-sm text-on-surface placeholder-on-surface-variant/50 outline-none border border-outline-variant/20 focus:border-primary/40 transition-colors">
    </div>

    <!-- Progress summary -->
    <div class="bg-primary-container/15 rounded-xl p-4 mb-6 flex items-center gap-4">
      <div class="w-12 h-12 bg-primary-container/30 rounded-full flex items-center justify-center flex-shrink-0">
        <span class="font-manrope font-bold text-primary text-sm" id="progress-fraction">0/0</span>
      </div>
      <div class="flex-1">
        <p class="text-sm font-semibold text-on-surface" id="progress-label">Loading your list...</p>
        <div class="mt-1.5 h-1.5 bg-surface-container rounded-full overflow-hidden">
          <div class="h-full bg-gradient-to-r from-primary to-secondary rounded-full transition-all duration-500" id="progress-bar" style="width:0%"></div>
        </div>
      </div>
      <span class="text-xs text-on-surface-variant font-medium" id="progress-cost">$0.00 est.</span>
    </div>

    <!-- Quick Add -->
    <div class="mb-6">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-manrope font-bold text-sm text-on-surface uppercase tracking-wide">Quick Add</h2>
        <span class="text-xs text-on-surface-variant">Tap to add</span>
      </div>
      <div id="quick-add-row" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Dynamic category sections -->
    <div id="list-categories"></div>

    <!-- AI Suggested items -->
    <div class="mb-5" id="suggested-section" style="display:none">
      <div class="flex items-center gap-2 mb-3">
        <span class="material-symbols-outlined text-primary" style="font-size:18px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">auto_awesome</span>
        <h2 class="font-manrope font-bold text-sm text-on-surface uppercase tracking-wide">AI Suggested For You</h2>
      </div>
      <div id="suggested-items" class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm divide-y divide-outline-variant/10"></div>
    </div>

    <!-- Add item row -->
    <button onclick="showAddModal()" class="w-full flex items-center gap-3 p-4 rounded-xl border-2 border-dashed border-outline-variant/40 text-on-surface-variant hover:border-primary/30 hover:text-primary hover:bg-primary/5 transition-all duration-200 active:scale-[0.98]">
      <span class="material-symbols-outlined" style="font-size:20px">add_circle</span>
      <span class="text-sm font-medium">Add item to list</span>
    </button>

  </main>

  <!-- Bottom nav -->
  <nav class="fixed bottom-0 inset-x-0 bg-white rounded-t-[24px] shadow-[0_-8px_24px_rgba(0,0,0,0.06)] px-8 pb-8 pt-4 z-50">
    <div class="max-w-2xl mx-auto flex items-center justify-around">
      <a href="lists.html" class="nav-tab-active flex items-center gap-1.5 px-4 py-2 transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined" style="font-size:22px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">checklist</span>
        <span class="text-xs font-semibold">Lists</span>
      </a>
      <a href="missions.html" class="nav-tab-inactive flex flex-col items-center gap-0.5 px-3 py-1.5 transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined" style="font-size:22px">assignment_turned_in</span>
        <span class="text-xs font-medium">Missions</span>
      </a>
      <a href="deals.html" class="nav-tab-inactive flex flex-col items-center gap-0.5 px-3 py-1.5 transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined" style="font-size:22px">local_offer</span>
        <span class="text-xs font-medium">Deals</span>
      </a>
      <a href="cart.html" class="nav-tab-inactive flex flex-col items-center gap-0.5 px-3 py-1.5 transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined" style="font-size:22px">shopping_cart</span>
        <span class="text-xs font-medium">Cart</span>
      </a>
    </div>
  </nav>

  <!-- Add Item Modal -->
  <div id="add-modal" class="fixed inset-0 z-[100] flex items-end justify-center hidden" onclick="hideAddModal(event)">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-t-[24px] w-full max-w-2xl p-6 pb-10 shadow-2xl" onclick="event.stopPropagation()">
      <div class="w-10 h-1 bg-outline-variant rounded-full mx-auto mb-5"></div>
      <h3 class="font-manrope font-bold text-lg text-on-surface mb-4">Add Item</h3>
      <div class="flex gap-3">
        <input type="text" id="new-item-input" placeholder="e.g. Almond milk, 1 gallon" class="flex-1 h-12 bg-surface-container-highest rounded-xl px-4 text-sm text-on-surface placeholder-on-surface-variant/40 outline-none focus:ring-2 focus:ring-primary/30">
        <button onclick="addItem()" class="h-12 px-5 bg-primary text-on-primary rounded-xl font-semibold text-sm hover:bg-primary-dim transition-colors active:scale-95">Add</button>
      </div>
    </div>
  </div>

  <script src="data/grocery.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ai-filter.js"></script>
  <script>
    const CAT_EMOJIS = {
      'Produce':'🥬','Dairy & Eggs':'🥛','Meat & Seafood':'🥩',
      'Plant-Based':'🌱','Bakery':'🍞','Frozen':'🧊',
      'Grains & Pasta':'🌾','Canned Goods':'🥫','Pantry & Condiments':'🫙',
      'Beverages':'🥤','Snacks':'🍿','Breakfast':'🥣','Specialty':'⭐'
    };

    let listIds = JSON.parse(localStorage.getItem('opticart_list') || '[]');
    let checkedIds = JSON.parse(localStorage.getItem('opticart_checked') || '[]');

    function saveState() {
      localStorage.setItem('opticart_list', JSON.stringify(listIds));
      localStorage.setItem('opticart_checked', JSON.stringify(checkedIds));
    }

    function updateProgress() {
      const total = listIds.length;
      const done = checkedIds.length;
      const cost = listIds.reduce((s, id) => {
        const item = GROCERY_DB.items.find(i => i.id === id);
        return s + (item ? item.price : 0);
      }, 0);
      const pct = total ? Math.round((done / total) * 100) : 0;
      document.getElementById('progress-fraction').textContent = `${done}/${total}`;
      document.getElementById('progress-label').textContent = `${done} of ${total} items checked`;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-cost').textContent = `$${cost.toFixed(2)} est.`;

      const today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
      document.getElementById('list-subtitle').textContent = `${today} · ${total} items`;
    }

    function listItemHTML(item, checked) {
      const circleClass = checked
        ? 'bg-primary border-primary'
        : 'border-outline-variant';
      const checkIcon = checked
        ? `<span class="material-symbols-outlined text-white" style="font-size:14px;font-variation-settings:'FILL' 1,'wght' 600,'GRAD' 0,'opsz' 24">check</span>`
        : '';
      const rowClass = checked ? 'item-checked' : '';
      return `
        <div class="list-item ${rowClass} flex items-center gap-4 p-4" onclick="toggleItem(this,'${item.id}')">
          <div class="w-6 h-6 rounded-full border-2 ${circleClass} flex items-center justify-center flex-shrink-0 check-circle-ui">${checkIcon}</div>
          <span class="item-name flex-1 text-sm text-on-surface">${item.emoji} ${item.name}</span>
          <span class="text-xs text-on-surface-variant">$${item.price.toFixed(2)}</span>
        </div>`;
    }

    function renderList() {
      const db = window.GROCERY_DB;
      if (!db) return;

      const catGroups = {};
      for (const id of listIds) {
        const item = db.items.find(i => i.id === id);
        if (!item) continue;
        if (!catGroups[item.cat]) catGroups[item.cat] = [];
        catGroups[item.cat].push(item);
      }

      let html = '';
      for (const [cat, items] of Object.entries(catGroups)) {
        const emoji = CAT_EMOJIS[cat] || '🛒';
        html += `
          <div class="mb-5">
            <div class="flex items-center gap-2 mb-3">
              <span class="text-base">${emoji}</span>
              <h2 class="font-manrope font-bold text-sm text-on-surface uppercase tracking-wide">${cat}</h2>
              <span class="text-xs text-on-surface-variant ml-auto">${items.length} items</span>
            </div>
            <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm divide-y divide-outline-variant/10">
              ${items.map(i => listItemHTML(i, checkedIds.includes(i.id))).join('')}
            </div>
          </div>`;
      }

      if (!html) {
        html = '<p class="text-sm text-on-surface-variant text-center py-6">Your list is empty. Add items below or from Deals!</p>';
      }

      document.getElementById('list-categories').innerHTML = html;
      updateProgress();
      renderQuickAdd();
    }

    function toggleItem(row, itemId) {
      const circle = row.querySelector('.check-circle-ui');
      const isChecked = circle.classList.contains('bg-primary');
      if (isChecked) {
        circle.classList.remove('bg-primary', 'border-primary');
        circle.classList.add('border-outline-variant');
        circle.innerHTML = '';
        row.classList.remove('item-checked');
        checkedIds = checkedIds.filter(id => id !== itemId);
      } else {
        circle.classList.add('bg-primary', 'border-primary');
        circle.classList.remove('border-outline-variant');
        circle.innerHTML = `<span class="material-symbols-outlined text-white" style="font-size:14px;font-variation-settings:'FILL' 1,'wght' 600,'GRAD' 0,'opsz' 24">check</span>`;
        row.classList.add('item-checked');
        if (!checkedIds.includes(itemId)) checkedIds.push(itemId);
      }
      saveState();
      updateProgress();
    }

    async function loadSuggested() {
      const profile = Storage.get();
      const apiKey = Storage.getApiKey();
      const items = await AIFilter.getItems('lists', profile, apiKey, 6);
      const newItems = items.filter(i => !listIds.includes(i.id));
      if (!newItems.length) return;

      document.getElementById('suggested-section').style.display = '';
      document.getElementById('suggested-items').innerHTML = newItems.slice(0, 5).map(item => `
        <div class="flex items-center gap-4 p-4">
          <span class="text-xl flex-shrink-0">${item.emoji}</span>
          <span class="flex-1 text-sm text-on-surface">${item.name}</span>
          <span class="text-xs text-on-surface-variant mr-2">$${item.price.toFixed(2)}</span>
          <button onclick="addSuggested('${item.id}', this)" class="text-xs font-semibold text-primary hover:text-primary-dim transition-colors">+ Add</button>
        </div>
      `).join('');
    }

    function addSuggested(itemId, btn) {
      if (!listIds.includes(itemId)) {
        listIds.push(itemId);
        saveState();
        renderList();
      }
      btn.closest('div').remove();
    }

    function showAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
    function hideAddModal() { document.getElementById('add-modal').classList.add('hidden'); }
    function addItem() {
      const input = document.getElementById('new-item-input');
      const val = input.value.trim();
      if (!val) return;
      // Search DB for matching item
      const match = GROCERY_DB.items.find(i =>
        i.name.toLowerCase().includes(val.toLowerCase())
      );
      if (match && !listIds.includes(match.id)) {
        listIds.push(match.id);
        saveState();
        renderList();
      }
      input.value = '';
      hideAddModal();
    }

    // ── Quick Add ──────────────────────────────────────────────────────────────
    const QUICK_ADD_NAMES = [
      'Eggs','Bananas','Bread','Milk','Butter','Chicken Breast','Pasta',
      'Rice','Onions','Apples','Greek Yogurt','Cheddar Cheese','Orange Juice',
      'Coffee','Olive Oil','Tomatoes','Potatoes','Carrots','Spinach','Oat Milk',
      'Avocado','Blueberries','Salmon','Broccoli','Garlic'
    ];

    function renderQuickAdd() {
      const db = window.GROCERY_DB;
      if (!db) return;

      const chips = QUICK_ADD_NAMES.map(name => {
        const item = db.items.find(i => i.name.toLowerCase().includes(name.toLowerCase()));
        return item || null;
      }).filter(Boolean);

      document.getElementById('quick-add-row').innerHTML = chips.map(item => {
        const inList = listIds.includes(item.id);
        return `
          <button
            id="qchip-${item.id}"
            onclick="quickAdd('${item.id}')"
            class="quick-chip flex items-center gap-1.5 px-3 py-2 rounded-full border text-xs font-semibold transition-all duration-200 active:scale-95 ${
              inList
                ? 'bg-primary border-primary text-on-primary cursor-default'
                : 'bg-surface-container-lowest border-outline-variant/30 text-on-surface hover:border-primary/40 hover:bg-primary-container/20'
            }">
            <span style="font-size:15px">${item.emoji}</span>
            ${item.name}
            ${inList ? '<span class="material-symbols-outlined" style="font-size:13px;font-variation-settings:\'FILL\' 1,\'wght\' 600,\'GRAD\' 0,\'opsz\' 24">check</span>' : ''}
          </button>`;
      }).join('');
    }

    function quickAdd(itemId) {
      const btn = document.getElementById('qchip-' + itemId);
      if (!btn || listIds.includes(itemId)) return;

      listIds.push(itemId);
      saveState();
      renderList();

      // Animate chip to added state
      btn.className = 'quick-chip flex items-center gap-1.5 px-3 py-2 rounded-full border text-xs font-semibold bg-primary border-primary text-on-primary cursor-default transition-all duration-200';
      const db = window.GROCERY_DB;
      const item = db && db.items.find(i => i.id === itemId);
      if (item) {
        btn.innerHTML = `<span style="font-size:15px">${item.emoji}</span>${item.name}<span class="material-symbols-outlined" style="font-size:13px;font-variation-settings:'FILL' 1,'wght' 600,'GRAD' 0,'opsz' 24">check</span>`;
      }
    }

    // Seed list with AI-personalized items if empty
    async function init() {
      if (listIds.length === 0) {
        const profile = Storage.get();
        const apiKey = Storage.getApiKey();
        const suggested = await AIFilter.getItems('lists', profile, apiKey, 15);
        listIds = suggested.map(i => i.id);
        saveState();
      }
      renderList();
      loadSuggested();
    }

    window.GROCERY_DB_READY.then(init);
  </script>

  <script>if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));</script>
</body>
</html>
