name: Deploy OptiCart to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy mobile folder to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: mobile
          branch: gh-pages
          clean: true
