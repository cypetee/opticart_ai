<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>OptiCart — Personal Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#006a35">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OptiCart">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { manrope: ['Manrope', 'sans-serif'], inter: ['Inter', 'sans-serif'] },
          colors: {
            primary: "#006a35", "primary-dim": "#005c2d", "primary-container": "#75f39c",
            "on-primary": "#cdffd4", secondary: "#006946", "secondary-container": "#72fbbd",
            "on-secondary-container": "#005e3e", surface: "#f6f6f9",
            "surface-container-lowest": "#ffffff", "surface-container-low": "#f0f0f3",
            "surface-container": "#e7e8eb", "surface-container-high": "#e1e2e6",
            "surface-container-highest": "#dbdde0", "on-surface": "#2d2f31",
            "on-surface-variant": "#5a5c5e", "outline-variant": "#acadaf",
            tertiary: "#006576", "tertiary-container": "#00dcff",
            "error-container": "#ffdad6", "on-error-container": "#410002",
          }
        }
      }
    }
  </script>
  <style>
    body { min-height: max(884px, 100dvh); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; line-height: 1; }
    .input-focus-line { position: relative; }
    .input-focus-line::after { content: ''; position: absolute; bottom: 0; left: 12px; right: 12px; height: 2px; background: #006a35; border-radius: 9999px; transform: scaleX(0); transform-origin: left; transition: transform 0.3s ease; }
    .input-focus-line:focus-within::after { transform: scaleX(1); }
  </style>
</head>
<body class="bg-surface text-on-surface font-inter overflow-x-hidden">

  <!-- Background blobs -->
  <div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
    <div class="absolute -top-32 -left-32 w-96 h-96 bg-primary-container/20 rounded-full blur-[120px]"></div>
    <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-primary-container/20 rounded-full blur-[120px]"></div>
  </div>

  <!-- Top bar -->
  <header class="fixed top-0 inset-x-0 z-50 h-16 bg-surface/80 backdrop-blur-md border-b border-outline-variant/10">
    <div class="max-w-2xl mx-auto h-full px-6 flex items-center justify-between">
      <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors duration-200 active:scale-95">
        <span class="material-symbols-outlined text-primary">arrow_back</span>
      </button>
      <span class="font-manrope font-extrabold italic text-xl tracking-tight text-on-surface">OptiCart</span>
      <div class="w-10"></div>
    </div>
  </header>

  <!-- Main content -->
  <main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">

    <!-- Progress -->
    <div class="mb-8">
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-xs font-semibold tracking-widest uppercase text-on-surface-variant">Step 1 of 4</span>
        <span class="font-manrope font-bold text-primary text-sm">25%</span>
      </div>
      <h1 class="font-manrope font-bold text-2xl text-on-surface mb-3">Personal Details</h1>
      <div class="h-3 w-full bg-surface-container-high rounded-full overflow-hidden">
        <div class="h-full bg-gradient-to-r from-primary to-secondary rounded-full transition-all duration-500" style="width:25%"></div>
      </div>
    </div>

    <!-- Form card -->
    <div class="bg-surface-container-low rounded-[24px] p-8 mb-5 shadow-sm">
      <p class="text-sm text-on-surface-variant mb-7 leading-relaxed">Tell us a bit about yourself so we can tailor your grocery shopping experience.</p>

      <!-- Age -->
      <div class="mb-7">
        <label class="block text-xs font-semibold tracking-widest uppercase text-on-surface-variant mb-2.5">Age</label>
        <div class="input-focus-line">
          <input
            id="age-input"
            type="number"
            placeholder="Enter your age"
            min="1" max="120"
            class="w-full h-14 bg-surface-container-highest rounded-xl px-5 text-base text-on-surface placeholder-on-surface-variant/40 outline-none focus:ring-0 border-none"
          >
        </div>
      </div>

      <!-- Gender -->
      <div>
        <label class="block text-xs font-semibold tracking-widest uppercase text-on-surface-variant mb-3">Gender</label>
        <div id="gender-chips" class="flex flex-wrap gap-2">
          <button onclick="selectChip(this)" class="chip chip-selected px-5 py-2 rounded-full bg-secondary-container text-on-secondary-container font-semibold text-sm transition-all duration-200 active:scale-95">Female</button>
          <button onclick="selectChip(this)" class="chip chip-unselected px-5 py-2 rounded-xl bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant text-sm hover:border-primary/40 transition-all duration-200 active:scale-95">Male</button>
          <button onclick="selectChip(this)" class="chip chip-unselected px-5 py-2 rounded-xl bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant text-sm hover:border-primary/40 transition-all duration-200 active:scale-95">Non-binary</button>
          <button onclick="selectChip(this)" class="chip chip-unselected px-5 py-2 rounded-xl bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant text-sm hover:border-primary/40 transition-all duration-200 active:scale-95">Prefer not to say</button>
        </div>
      </div>
    </div>

    <!-- Bento hint grid -->
    <div class="grid grid-cols-2 gap-4">
      <!-- Security tile -->
      <div class="bg-surface-container-low rounded-xl p-5 flex flex-col gap-3 shadow-sm">
        <div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center">
          <span class="material-symbols-outlined text-primary" style="font-size:20px">lock</span>
        </div>
        <p class="text-xs text-on-surface-variant leading-relaxed">Your data is <span class="font-semibold text-on-surface">encrypted</span> and never sold to third parties.</p>
      </div>
      <!-- Kitchen tile -->
      <div class="relative rounded-xl overflow-hidden bg-surface-container" style="min-height:112px">
        <div class="absolute inset-0 bg-gradient-to-br from-secondary/60 via-primary/40 to-primary-dim/70"></div>
        <div class="absolute top-3 right-3 text-3xl opacity-30 select-none">🥗</div>
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/40 to-transparent">
          <p class="text-xs font-semibold text-white leading-tight">Personalized for your kitchen</p>
        </div>
      </div>
    </div>

  </main>

  <!-- Bottom nav -->
  <nav class="fixed bottom-0 inset-x-0 bg-white rounded-t-[24px] shadow-[0_-8px_24px_rgba(0,0,0,0.06)] px-8 pb-8 pt-4 z-50">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <button disabled class="flex items-center gap-1 text-sm text-on-surface-variant/30 cursor-not-allowed select-none">
        <span class="material-symbols-outlined" style="font-size:18px">chevron_left</span>
        Previous
      </button>
      <button onclick="goNext()" class="flex items-center gap-2 px-7 py-3 rounded-full bg-primary/10 text-primary font-semibold text-sm hover:bg-primary/15 transition-all duration-200 active:scale-[0.98]">
        Next
        <span class="material-symbols-outlined" style="font-size:18px">chevron_right</span>
      </button>
    </div>
  </nav>

  <script src="js/storage.js"></script>
  <script>
    // Pre-fill from storage
    (function() {
      const p = Storage.get();
      if (p.age) document.getElementById('age-input').value = p.age;
      if (p.gender) {
        document.querySelectorAll('#gender-chips .chip').forEach(c => {
          if (c.textContent.trim() === p.gender) selectChip(c);
        });
      }
    })();

    function selectChip(el) {
      document.querySelectorAll('#gender-chips .chip').forEach(c => {
        c.classList.remove('chip-selected', 'rounded-full', 'bg-secondary-container', 'text-on-secondary-container', 'font-semibold');
        c.classList.add('chip-unselected', 'rounded-xl', 'bg-surface-container-lowest', 'border', 'border-outline-variant/30', 'text-on-surface-variant');
      });
      el.classList.remove('chip-unselected', 'rounded-xl', 'bg-surface-container-lowest', 'border', 'border-outline-variant/30', 'text-on-surface-variant');
      el.classList.add('chip-selected', 'rounded-full', 'bg-secondary-container', 'text-on-secondary-container', 'font-semibold');
    }

    function goNext() {
      const age = document.getElementById('age-input').value;
      const selectedChip = document.querySelector('#gender-chips .chip-selected');
      const gender = selectedChip ? selectedChip.textContent.trim() : null;
      Storage.set({ age: age ? parseInt(age) : null, gender });
      window.location.href = 'screen2.html';
    }
  </script>

  <script>if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));</script>
</body>
</html>
